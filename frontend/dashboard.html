<!DOCTYPE html>
<html>

<head>

<title>
Enterprise Maritime AI Command Center
</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.metric{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.timestamp{
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<h1>
Enterprise Maritime AI Command Center
</h1>

<div class="card">
<h2>Overall Status</h2>
<div id="overallStatus" class="metric">
ACTIVE
</div>
</div>

<div class="card">
<h2>Active Vessels</h2>
<div id="activeVessels" class="metric">
1
</div>
</div>

<div class="card">
<h2>Market Sentiment</h2>
<div id="marketSentiment" class="metric">
BULLISH
</div>
</div>

<div class="card">
<h2>Weather Risk</h2>
<div id="weatherRisk" class="metric">
LOW
</div>
</div>

<div class="card">
<h2>Congestion Risk</h2>
<div id="congestionRisk" class="metric">
LOW
</div>
</div>

<div class="card">
<h2>Voyage Risk</h2>
<div id="voyageRisk" class="metric">
LOW
</div>
</div>

<div class="card">
<h2>Last Updated</h2>
<div id="lastUpdated" class="timestamp">
Loading...
</div>
</div>

<script>

async function loadHealth(){

try{

const response=
await fetch('/api/health');

const data=
await response.json();

document
.getElementById('overallStatus')
.innerText=
data.system;

document
.getElementById('lastUpdated')
.innerText=
data.timestamp;

}
catch(error){

console.log(error);

}

}

loadHealth();

setInterval(
loadHealth,
30000
);

</script>

</body>

</html>
