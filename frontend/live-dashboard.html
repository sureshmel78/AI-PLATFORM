<!DOCTYPE html>
<html>

<head>

<title>Maritime AI Live Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

h1{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.value{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.timestamp{
margin-top:20px;
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<h1>Enterprise Maritime AI Command Center</h1>

<div class="grid">

<div class="card">
<h3>Overall Status</h3>
<div id="overallStatus" class="value">-</div>
</div>

<div class="card">
<h3>Active Vessels</h3>
<div id="activeVessels" class="value">-</div>
</div>

<div class="card">
<h3>Market Sentiment</h3>
<div id="marketSentiment" class="value">-</div>
</div>

<div class="card">
<h3>Weather Risk</h3>
<div id="weatherRisk" class="value">-</div>
</div>

<div class="card">
<h3>Congestion Risk</h3>
<div id="congestionRisk" class="value">-</div>
</div>

<div class="card">
<h3>Voyage Risk</h3>
<div id="voyageRisk" class="value">-</div>
</div>

</div>

<div class="timestamp">
Last Updated:
<span id="lastUpdated">-</span>
</div>

<script>

async function loadDashboard(){

try{

const response=
await fetch(
'/api/public/dashboard'
);

const result=
await response.json();

const data=
result.data;

document.getElementById(
'overallStatus'
).innerText=
data.overallStatus;

document.getElementById(
'activeVessels'
).innerText=
data.executiveSummary.activeVessels;

document.getElementById(
'marketSentiment'
).innerText=
data.executiveSummary.marketSentiment;

document.getElementById(
'weatherRisk'
).innerText=
data.executiveSummary.weatherRisk;

document.getElementById(
'congestionRisk'
).innerText=
data.executiveSummary.congestionRisk;

document.getElementById(
'voyageRisk'
).innerText=
data.executiveSummary.voyageRisk;

document.getElementById(
'lastUpdated'
).innerText=
new Date().toLocaleString();

}
catch(error){

console.log(error);

}

}

loadDashboard();

setInterval(
loadDashboard,
30000
);

</script>

</body>

</html>
